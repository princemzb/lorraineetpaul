services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: mariage
      POSTGRES_USER: mariage
      POSTGRES_PASSWORD: mariage_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mariage"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mariage:mariage_secret@db:5432/mariage?sslmode=disable&connect_timeout=10
      AUTH_SECRET: super_secret_jwt_key_change_in_production
      NEXTAUTH_URL: http://localhost:3000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      MAIL_FROM: "Loraine & Paul <noreply@mariage-loraine-paul.fr>"
      APP_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started

volumes:
  postgres_data:
